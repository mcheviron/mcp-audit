name: Audit Self-Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run mcp-audit via local action
        id: audit
        uses: ./action
        with:
          format: sarif
          severity-min: INFO
          no-cve-scan: 'true'

      - name: Verify outputs
        run: |
          echo "Critical: ${{ steps.audit.outputs.critical-count }}"
          echo "High: ${{ steps.audit.outputs.high-count }}"
          echo "Medium: ${{ steps.audit.outputs.medium-count }}"
          echo "Low: ${{ steps.audit.outputs.low-count }}"
          echo "SARIF file: ${{ steps.audit.outputs.sarif-file }}"
