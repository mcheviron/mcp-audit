version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mcp-audit
    main: ./cmd/mcp-audit
    binary: mcp-audit
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

sboms:
  - id: source
    artifacts: source
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_sbom.spdx.json"

signs:
  - id: cosign-keyless
    cmd: cosign
    args:
      - sign-blob
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - --yes
      - ${artifact}
    artifacts: all
    output: true

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*

nfpms:
  - id: default
    package_name: mcp-audit
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: mcheviron
    homepage: https://github.com/mostafaelataby-cheviron/mcp-audit
    maintainer: mcheviron
    description: MCP ecosystem security auditor
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: ./completions/mcp-audit.bash
        dst: /usr/share/bash-completion/completions/mcp-audit
      - src: ./completions/mcp-audit.zsh
        dst: /usr/share/zsh/site-functions/_mcp-audit
      - src: ./completions/mcp-audit.fish
        dst: /usr/share/fish/vendor_completions.d/mcp-audit.fish

brews:
  - name: mcp-audit
    repository:
      owner: mostafaelataby-cheviron
      name: homebrew-tap
    homepage: https://github.com/mostafaelataby-cheviron/mcp-audit
    description: MCP ecosystem security auditor
    license: MIT

scoops:
  - name: mcp-audit
    repository:
      owner: mostafaelataby-cheviron
      name: scoop-bucket
    homepage: https://github.com/mostafaelataby-cheviron/mcp-audit
    description: MCP ecosystem security auditor
    license: MIT

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: mostafaelataby-cheviron
    name: mcp-audit
  prerelease: auto
